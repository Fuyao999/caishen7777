<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财神大陆 - V8逻辑修正版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            padding: 15px;
        }
        .container { max-width: 950px; margin: 0 auto; }
        h1 { text-align: center; font-size: 36px; margin-bottom: 15px; color: #FFD700; }
        .stats {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .stat-item { text-align: center; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 8px; }
        .stat-value { font-size: 18px; font-weight: bold; color: #FFD700; }
        .stat-label { font-size: 10px; opacity: 0.8; }
        .buff-bar {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 12px;
            font-size: 12px;
        }
        .buff-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
        .buff-item {
            display: inline-block;
            background: rgba(255,215,0,0.2);
            border: 1px solid #FFD700;
            border-radius: 10px;
            padding: 2px 8px;
            font-size: 10px;
        }
        .section { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .section h2 { color: #FFD700; margin-bottom: 12px; font-size: 18px; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none; color: white; padding: 10px 20px;
            border-radius: 8px; cursor: pointer; font-size: 14px; margin: 3px;
        }
        .materials { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; margin: 10px 0; }
        .material-btn {
            background: rgba(0,0,0,0.3);
            border: 2px solid transparent;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
        }
        .material-btn.selected { border-color: #FFD700; background: rgba(255,215,0,0.2); }
        .god-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 10px; }
        .god-item {
            background: rgba(0,0,0,0.2); padding: 10px; border-radius: 6px;
            text-align: center; cursor: pointer; border: 2px solid transparent;
            font-size: 11px;
        }
        .god-item.selected { border-color: #FFD700; background: rgba(255,215,0,0.2); }
        .god-item.has-buff { border-color: #2ecc71; }
        .god-name { font-weight: bold; color: #FFD700; font-size: 12px; }
        .god-effect { font-size: 9px; margin-top: 2px; }
        .god-buff-count { font-size: 9px; color: #2ecc71; }
        .region-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
        .region-item {
            background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px;
            text-align: center; cursor: pointer;
        }
        .region-name { font-size: 18px; font-weight: bold; }
        .region-risk { font-size: 10px; margin-top: 3px; color: #ff6b6b; }
        .log {
            background: rgba(0,0,0,0.3); border-radius: 8px;
            padding: 10px; margin-top: 10px; min-height: 100px; max-height: 300px; overflow-y: auto;
        }
        .log-item { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 13px; line-height: 1.5; }
        .event-great { color: #FFD700; font-weight: bold; }
        .event-good { color: #2ecc71; }
        .event-bad { color: #ff6b6b; }
        .event-terrible { color: #e74c3c; font-weight: bold; }
        .hidden { display: none; }
        .nav { display: flex; justify-content: center; gap: 6px; margin-bottom: 12px; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 2px solid transparent; padding: 8px 16px; font-size: 13px; }
        .nav-btn.active { border-color: #FFD700; background: rgba(255,215,0,0.2); }
        .story-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px; margin: 8px 0; font-size: 13px; line-height: 1.6; }
        .stack-mode { font-size: 11px; color: #ccc; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏮 财神大陆 V8</h1>
        
        <div class="stats">
            <div class="stat-item"><div class="stat-value" id="money">1000</div><div class="stat-label">香火钱</div></div>
            <div class="stat-item"><div class="stat-value" id="merit">0</div><div class="stat-label">功德</div></div>
            <div class="stat-item"><div class="stat-value" id="mana">100</div><div class="stat-label">法力</div></div>
            <div class="stat-item"><div class="stat-value" id="level">1</div><div class="stat-label">等级</div></div>
            <div class="stat-item"><div class="stat-value" id="stage">泥胎</div><div class="stat-label">阶段</div></div>
            <div class="stat-item"><div class="stat-value" id="yuanbao">100</div><div class="stat-label">元宝</div></div>
        </div>
        
        <div class="buff-bar">
            <strong>🙏 财神庇佑：</strong><span id="buff-list">无</span>
            <div class="stack-mode">💡 供奉规则：相同财神次数叠加，不同财神共存</div>
        </div>
        
        <div style="text-align: center; margin-bottom: 8px; font-size: 11px;">
            线香<span id="incense-sticks">10</span> | 蜡烛<span id="candles">5</span> | 金纸<span id="gold-paper">3</span> | 供果<span id="fruits">2</span>
        </div>
        
        <div class="nav">
            <button class="btn nav-btn active" onclick="showSection('temple')">🏛️ 庙宇</button>
            <button class="btn nav-btn" onclick="showSection('alms')">🚶 化缘</button>
            <button class="btn nav-btn" onclick="showSection('upgrade')">⬆️ 升级</button>
        </div>
        
        <!-- 庙宇 -->
        <div id="temple-section" class="section">
            <h2>供奉财神</h2>
            <div class="materials">
                <button class="material-btn selected" id="mat-incense" onclick="selectMaterial('incense')">📿 线香(1次)</button>
                <button class="material-btn" id="mat-candle" onclick="selectMaterial('candle')">🕯️ 蜡烛(3次)</button>
                <button class="material-btn" id="mat-paper" onclick="selectMaterial('paper')">📜 金纸(5次)</button>
                <button class="material-btn" id="mat-fruit" onclick="selectMaterial('fruit')">🍎 供果(10次)</button>
            </div>
            <div class="god-list" id="god-list"></div>
            <div style="text-align: center; margin-top: 10px;">
                <button class="btn" onclick="worship()">🙏 供奉</button>
            </div>
            <div class="log" id="temple-log"></div>
        </div>
        
        <!-- 化缘 -->
        <div id="alms-section" class="section hidden">
            <h2>外出化缘</h2>
            <div class="region-list">
                <div class="region-item" onclick="goAlms('east', 0.10, 100)">
                    <div class="region-name">东</div>
                    <div class="region-risk">风险10% | 收益100</div>
                </div>
                <div class="region-item" onclick="goAlms('south', 0.20, 200)">
                    <div class="region-name">南</div>
                    <div class="region-risk">风险20% | 收益200</div>
                </div>
                <div class="region-item" onclick="goAlms('west', 0.30, 300)">
                    <div class="region-name">西</div>
                    <div class="region-risk">风险30% | 收益300</div>
                </div>
                <div class="region-item" onclick="goAlms('north', 0.40, 500)">
                    <div class="region-name">北</div>
                    <div class="region-risk">风险40% | 收益500</div>
                </div>
            </div>
            <div class="log" id="alms-log"></div>
        </div>
        
        <!-- 升级 -->
        <div id="upgrade-section" class="section hidden">
            <h2>升级进化</h2>
            <div style="text-align: center;">
                <div style="font-size: 24px; color: #FFD700; margin-bottom: 10px;" id="current-stage">泥胎</div>
                <div id="need-resources"></div>
                <button class="btn" onclick="doUpgrade()">✨ 升级</button>
            </div>
            <div class="log" id="upgrade-log"></div>
        </div>
    </div>

    <script>

        let selectedGod = 0;
        let selectedMat = 'incense';
        let activeBuffs = {}; // { godId: count }
        
        // ==================== 修正版事件生成器（场景-角色配对）====================
        const EventGenerator = {

            generate(regionRisk, baseReward) {
                // 随机选一个故事模板
                const template = this.storyTemplates[Math.floor(Math.random() * this.storyTemplates.length)];
                
                // 从模板中随机选一个角色
                const char = template.characters[Math.floor(Math.random() * template.characters.length)];
                
                // 决定事件类型（根据风险）
                const rand = Math.random();
                let isGoodEvent;
                
                if (rand < regionRisk) {
                    // 风险触发 - 大凶
                    isGoodEvent = false;
                } else if (rand < regionRisk + 0.15) {
                    // 15%概率小凶
                    isGoodEvent = false;
                } else if (rand < regionRisk + 0.35) {
                    // 20%概率平淡
                    isGoodEvent = true;
                } else if (rand < regionRisk + 0.70) {
                    // 35%概率顺利
                    isGoodEvent = true;
                } else if (rand < regionRisk + 0.90) {
                    // 20%概率小吉
                    isGoodEvent = true;
                } else {
                    // 10%概率大吉
                    isGoodEvent = true;
                }
                
                // 计算收益
                let moneyChange = 0;
                let eventType;
                let ending;
                
                if (isGoodEvent) {
                    // 收益事件
                    let multiplier;
                    if (rand > 0.90) {
                        multiplier = 2.2; // 大吉
                        eventType = 'great';
                        ending = char.great;
                    } else if (rand > 0.70) {
                        multiplier = 1.5; // 小吉
                        eventType = 'good';
                        ending = char.great.replace('XXX', Math.floor(baseReward * 1.5));
                    } else if (rand > 0.35) {
                        multiplier = 1.0; // 顺利
                        eventType = 'normal';
                        ending = `误会解除！你获得了XXX香火钱！`;
                    } else {
                        multiplier = 0.6; // 平淡
                        eventType = 'fair';
                        ending = `虽然有点波折，但你还是拿到了XXX香火钱！`;
                    }
                    moneyChange = Math.floor(baseReward * multiplier);
                    ending = ending.replace('XXX', moneyChange);
                } else {
                    // 损失事件
                    if (rand < regionRisk) {
                        // 大凶
                        eventType = 'terrible';
                        moneyChange = Math.floor(gameData.incense_money * 0.35);
                        ending = char.terrible.replace('XXX', moneyChange);
                    } else {
                        // 小凶
                        eventType = 'bad';
                        moneyChange = Math.floor(gameData.incense_money * 0.15);
                        ending = `虽然拿到了一些钱，但被敲诈后净损失XXX香火钱！`;
                        ending = ending.replace('XXX', moneyChange);
                    }
                }
                
                // 组装故事
                const story = `${template.scene}，${char.text} ${char.conflict}`;
                
                return {
                    type: eventType,
                    story: story,
                    ending: ending,
                    moneyChange: moneyChange,
                    isGain: isGoodEvent,
                    character: char.name
                };
            }
        };
        
        // ==================== 初始化 ====================
        function init() {
            renderGods();
            updateUI();
            setInterval(recoverMana, 1000);
        }
        
        function renderGods() {
            const container = document.getElementById('god-list');
            container.innerHTML = gods.map((god, index) => {
                const hasBuff = activeBuffs[god.id];
                const unlocked = god.unlocked ? '' : '🔒';
                return `
                    <div class="god-item ${index === selectedGod ? 'selected' : ''} ${hasBuff ? 'has-buff' : ''} ${!god.unlocked ? 'disabled' : ''}" 
                         onclick="${god.unlocked ? `selectGod(${index})` : ''}">
                        <div class="god-name">${unlocked}${god.name}</div>
                        <div class="god-effect">${god.effect}</div>
                        ${hasBuff ? `<div class="god-buff-count">⏳${activeBuffs[god.id]}次</div>` : ''}
                    </div>
                `;
            }).join('');
        }
        
        function selectGod(index) {
            selectedGod = index;
            renderGods();
        }
        
        function selectMaterial(mat) {
            selectedMat = mat;
            document.querySelectorAll('.material-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('mat-' + mat).classList.add('selected');
        }
        
        // ==================== 供奉（修正：次数叠加）====================
        function worship() {
            const god = gods[selectedGod];
            if (!god.unlocked) {
                log('temple-log', `🔒 ${god.name}尚未解锁！`, 'event-bad');
                return;
            }
            
            const mat = materials[selectedMat];
            if (gameData[mat.item] < mat.cost) {
                log('temple-log', `❌ ${mat.name}不足！`, 'event-bad');
                return;
            }
            
            gameData[mat.item] -= mat.cost;
            
            // 修正：次数叠加（不是刷新）
            if (!activeBuffs[god.id]) {
                activeBuffs[god.id] = 0;
            }
            activeBuffs[god.id] += mat.duration;
            
            // 供奉奖励
            let baseReward = { incense: 10, candle: 20, paper: 30, fruit: 50 }[selectedMat];
            let meritGain = 1;
            
            // 土地公首供双倍
            if (god.id === 'tudi' && !activeBuffs['tudi_first_done']) {
                baseReward *= 2;
                meritGain += 5;
                activeBuffs['tudi_first_done'] = true;
            }
            
            gameData.incense_money += baseReward;
            gameData.merit += meritGain;
            
            log('temple-log', `🙏 供奉${god.name}(${mat.name}) +${baseReward}钱 +${meritGain}功德 累计${activeBuffs[god.id]}次`, 'event-good');
            
            renderGods();
            updateBuffDisplay();
            updateUI();
        }
        
        // ==================== 化缘 ====================
        function goAlms(region, risk, baseReward) {
            if (gameData.mana < 5) {
                log('alms-log', '❌ 法力不足！', 'event-bad');
                return;
            }
            
            gameData.mana -= 5;
            
            // 计算加成
            let finalBase = baseReward;
            let finalRisk = risk;
            let critChance = 0;
            
            for (const id in activeBuffs) {
                if (id === 'tudi_first_done') continue;
                const god = gods.find(g => g.id === id);
                if (!god) continue;
                
                if (god.type === 'alms') finalBase *= (1 + god.bonus);
                if (god.type === 'alms_money') finalBase *= (1 + god.bonus);
                if (god.type === 'regional' && god.region === region) finalBase *= (1 + god.bonus);
                if (god.type === 'risk') finalRisk = Math.max(0.05, finalRisk + god.bonus);
                if (god.type === 'crit') critChance = god.bonus;
            }
            
            // 生成事件
            const evt = EventGenerator.generate(finalRisk, finalBase);
            
            // 应用暴击
            if (evt.isGain && Math.random() < critChance) {
                evt.moneyChange *= 3;
                evt.ending = '💥暴击！' + evt.ending;
            }
            
            // 执行结果
            if (evt.isGain) {
                gameData.incense_money += evt.moneyChange;
            } else {
                gameData.incense_money = Math.max(0, gameData.incense_money - evt.moneyChange);
            }
            
            // 显示结果
            const typeClass = {
                'great': 'event-great',
                'good': 'event-good',
                'normal': '',
                'fair': '',
                'bad': 'event-bad',
                'terrible': 'event-terrible'
            }[evt.type];
            
            const typeName = {
                'great': '🎉大吉',
                'good': '✨小吉',
                'normal': '✅顺利',
                'fair': '😐平淡',
                'bad': '😰小凶',
                'terrible': '💀大凶'
            }[evt.type];
            
            log('alms-log', 
                `<div class="story-box"><strong>${typeName} | 遇到：${evt.character}</strong><br>${evt.story}<br><strong>${evt.ending}</strong></div>`,
                typeClass
            );
            
            // 消耗BUFF（所有BUFF都减1）
            for (const id in activeBuffs) {
                if (id === 'tudi_first_done') continue;
                activeBuffs[id]--;
                if (activeBuffs[id] <= 0) {
                    delete activeBuffs[id];
                }
            }
            
            renderGods();
            updateBuffDisplay();
            updateUI();
        }
        
        function updateBuffDisplay() {
            const buffList = document.getElementById('buff-list');
            const buffCount = Object.keys(activeBuffs).filter(k => k !== 'tudi_first_done').length;
            
            if (buffCount === 0) {
                buffList.innerHTML = '无';
                return;
            }
            
            let html = '';
            for (const godId in activeBuffs) {
                if (godId === 'tudi_first_done') continue;
                const god = gods.find(g => g.id === godId);
                if (god) {
                    html += `<span class="buff-item">${god.name}(${activeBuffs[godId]})</span>`;
                }
            }
            buffList.innerHTML = html;
        }
        
        // ==================== 升级 ====================
        function doUpgrade() {
            const need = { merit: 100, money: 5000, incense: 50, candles: 20 };
            
            if (gameData.merit < need.merit) {
                log('upgrade-log', `❌ 功德不足！需${need.merit}`, 'event-bad');
                return;
            }
            if (gameData.incense_money < need.money) {
                log('upgrade-log', `❌ 香火钱不足！需${need.money}`, 'event-bad');
                return;
            }
            if (gameData.incense_sticks < need.incense || gameData.candles < need.candles) {
                log('upgrade-log', `❌ 材料不足！`, 'event-bad');
                return;
            }
            
            gameData.incense_money -= need.money;
            gameData.incense_sticks -= need.incense;
            gameData.candles -= need.candles;
            gameData.level += 5;
            
            if (gameData.level >= 6) gameData.stage = 'wood';
            
            log('upgrade-log', `🎉 升级成功！等级${gameData.level}！`, 'event-great');
            updateUI();
        }
        
        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(section + '-section').classList.remove('hidden');
            event.target.classList.add('active');
            updateUI();
        }
        
        function updateUI() {
            document.getElementById('money').textContent = gameData.incense_money;
            document.getElementById('merit').textContent = gameData.merit;
            document.getElementById('mana').textContent = Math.floor(gameData.mana);
            document.getElementById('level').textContent = gameData.level;
            document.getElementById('stage').textContent = gameData.level < 6 ? '泥胎' : '木骨';
            document.getElementById('yuanbao').textContent = gameData.yuanbao;
            
            document.getElementById('incense-sticks').textContent = gameData.incense_sticks;
            document.getElementById('candles').textContent = gameData.candles;
            document.getElementById('gold-paper').textContent = gameData.gold_paper;
            document.getElementById('fruits').textContent = gameData.fruits;
            
            const need = { merit: 100, money: 5000, incense: 50, candles: 20 };
            document.getElementById('need-resources').innerHTML = `
                功德:${gameData.merit}/${need.merit} | 
                钱:${gameData.incense_money}/${need.money} | 
                香:${gameData.incense_sticks}/${need.incense} | 
                蜡:${gameData.candles}/${need.candles}
            `;
        }
        
        function recoverMana() {
            if (gameData.mana < 100) {
                gameData.mana++;
                updateUI();
            }
        }
        
        function log(containerId, html, className = '') {
            const container = document.getElementById(containerId);
            const item = document.createElement('div');
            item.className = 'log-item ' + className;
            item.innerHTML = html;
            container.insertBefore(item, container.firstChild);
            while (container.children.length > 10) {
                container.removeChild(container.lastChild);
            }
        }
        
        init();
    </script>
