<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财神大陆 - 测试版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; font-size: 48px; margin-bottom: 20px; color: #FFD700; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .stats {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .stat-item { text-align: center; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; }
        .stat-value { font-size: 24px; font-weight: bold; color: #FFD700; }
        .stat-label { font-size: 12px; opacity: 0.8; margin-top: 5px; }
        .section { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .section h2 { color: #FFD700; margin-bottom: 15px; font-size: 24px; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none; color: white; padding: 15px 30px;
            border-radius: 10px; cursor: pointer; font-size: 18px; margin: 5px;
            transition: all 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-small { padding: 10px 20px; font-size: 14px; }
        .materials { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin: 15px 0; }
        .material-btn {
            background: rgba(0,0,0,0.3);
            border: 2px solid transparent;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .material-btn:hover { border-color: #FFD700; }
        .material-btn.selected { border-color: #FFD700; background: rgba(255,215,0,0.2); }
        .god-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .god-item {
            background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px;
            text-align: center; cursor: pointer; border: 2px solid transparent;
            transition: all 0.3s;
        }
        .god-item:hover { border-color: #FFD700; }
        .god-item.selected { border-color: #FFD700; background: rgba(255,215,0,0.2); }
        .god-name { font-weight: bold; color: #FFD700; font-size: 16px; }
        .god-effect { font-size: 12px; margin-top: 5px; opacity: 0.8; }
        .region-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .region-item {
            background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px;
            text-align: center; cursor: pointer; transition: all 0.3s;
        }
        .region-item:hover { background: rgba(0,0,0,0.3); }
        .region-name { font-size: 24px; font-weight: bold; }
        .region-risk { font-size: 12px; margin-top: 5px; }
        .region-reward { font-size: 14px; color: #FFD700; margin-top: 5px; }
        .log {
            background: rgba(0,0,0,0.3); border-radius: 10px;
            padding: 15px; margin-top: 15px; min-height: 100px; max-height: 200px; overflow-y: auto;
        }
        .log-item { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 14px; }
        .upgrade-info { text-align: center; padding: 20px; }
        .current-stage { font-size: 32px; color: #FFD700; margin-bottom: 10px; }
        .need-resources { font-size: 16px; margin-bottom: 20px; line-height: 1.8; }
        .hidden { display: none; }
        .nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 2px solid transparent; }
        .nav-btn.active { border-color: #FFD700; background: rgba(255,215,0,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏮 财神大陆</h1>
        
        <div class="stats">
            <div class="stat-item"><div class="stat-value" id="money">1000</div><div class="stat-label">香火钱</div></div>
            <div class="stat-item"><div class="stat-value" id="merit">0</div><div class="stat-label">功德</div></div>
            <div class="stat-item"><div class="stat-value" id="mana">100</div><div class="stat-label">法力</div></div>
            <div class="stat-item"><div class="stat-value" id="level">1</div><div class="stat-label">等级</div></div>
            <div class="stat-item"><div class="stat-value" id="stage">泥胎</div><div class="stat-label">阶段</div></div>
            <div class="stat-item"><div class="stat-value" id="yuanbao">100</div><div class="stat-label">元宝</div></div>
        </div>
        
        <div style="text-align: center; margin-bottom: 10px; font-size: 14px;">
            材料: 线香<span id="incense-sticks">10</span> | 
            蜡烛<span id="candles">5</span> | 
            金纸<span id="gold-paper">3</span> | 
            供果<span id="fruits">2</span>
        </div>
        
        <div class="nav">
            <button class="btn nav-btn active" onclick="showSection('temple')">🏛️ 庙宇</button>
            <button class="btn nav-btn" onclick="showSection('alms')">🚶 化缘</button>
            <button class="btn nav-btn" onclick="showSection('upgrade')">⬆️ 升级</button>
        </div>
        
        <!-- 庙宇 -->
        <div id="temple-section" class="section">
            <h2>供奉财神</h2>
            <p>选择供奉材料，不同材料奖励不同</p>
            
            <div class="materials">
                <button class="material-btn selected" id="mat-incense" onclick="selectMaterial('incense')">
                    📿 线香<br><small>基础 +10</small>
                </button>
                <button class="material-btn" id="mat-candle" onclick="selectMaterial('candle')">
                    🕯️ 蜡烛<br><small>中级 +20</small>
                </button>
                <button class="material-btn" id="mat-paper" onclick="selectMaterial('paper')">
                    📜 金纸<br><small>高级 +30</small>
                </button>
                <button class="material-btn" id="mat-fruit" onclick="selectMaterial('fruit')">
                    🍎 供果<br><small>顶级 +50</small>
                </button>
            </div>
            
            <div class="god-list" id="god-list"></div>
            <div style="text-align: center; margin-top: 15px;">
                <button class="btn" onclick="worship()">🙏 供奉所选财神</button>
            </div>
            <div class="log" id="temple-log"></div>
        </div>
        
        <!-- 化缘 -->
        <div id="alms-section" class="section hidden">
            <h2>外出化缘</h2>
            <p>消耗5点法力，选择地区化缘（测试版1秒恢复1点）</p>
            <div class="region-list">
                <div class="region-item" onclick="goAlms('east', 0.1, 100)">
                    <div class="region-name">东</div>
                    <div class="region-risk">风险: 低 (10%)</div>
                    <div class="region-reward">收益: 100±</div>
                </div>
                <div class="region-item" onclick="goAlms('south', 0.2, 200)">
                    <div class="region-name">南</div>
                    <div class="region-risk">风险: 中 (20%)</div>
                    <div class="region-reward">收益: 200±</div>
                </div>
                <div class="region-item" onclick="goAlms('west', 0.3, 300)">
                    <div class="region-name">西</div>
                    <div class="region-risk">风险: 高 (30%)</div>
                    <div class="region-reward">收益: 300±</div>
                </div>
                <div class="region-item" onclick="goAlms('north', 0.4, 500)">
                    <div class="region-name">北</div>
                    <div class="region-risk">风险: 极高 (40%)</div>
                    <div class="region-reward">收益: 500±</div>
                </div>
            </div>
            <div class="log" id="alms-log"></div>
        </div>
        
        <!-- 升级 -->
        <div id="upgrade-section" class="section hidden">
            <h2>升级进化</h2>
            <div class="upgrade-info">
                <div class="current-stage" id="current-stage">泥胎</div>
                <div class="need-resources" id="need-resources">
                    升级需要:<br>
                    ✨ 功德: 100 (门槛)<br>
                    💰 香火钱: 5000<br>
                    📿 线香: 50<br>
                    🕯️ 蜡烛: 20
                </div>
                <button class="btn" style="font-size: 20px; padding: 20px 40px;" onclick="doUpgrade()">
                    ✨ 立即升级
                </button>
            </div>
            <div class="log" id="upgrade-log"></div>
        </div>
    </div>

    <script>
        const gameData = {
            level: 1, stage: 'clay',
            incense_money: 1000, yuanbao: 100, merit: 0, mana: 100,
            incense_sticks: 10, candles: 5, gold_paper: 3, fruits: 2
        };
        
        const stages = {
            clay: { name: '泥胎', next: 'wood', need: { merit: 100, money: 5000, incense: 50, candles: 20 } },
            wood: { name: '木骨', next: 'bronze', need: { merit: 500, money: 20000, incense: 100, candles: 50 } },
            bronze: { name: '铜身', next: 'gold', need: { merit: 2000, money: 100000, incense: 200, candles: 100 } },
            gold: { name: '金身', next: null, need: null }
        };
        
        const materials = {
            incense: { name: '线香', item: 'incense_sticks', cost: 1, reward: 10, need: 0 },
            candle: { name: '蜡烛', item: 'candles', cost: 1, reward: 20, need: 0 },
            paper: { name: '金纸', item: 'gold_paper', cost: 1, reward: 30, need: 0 },
            fruit: { name: '供果', item: 'fruits', cost: 1, reward: 50, need: 0 }
        };
        
        const gods = [
            { id: 'caishen', name: '赵公明', title: '正财神', effect: '香火钱+20%', bonus: 1.2 },
            { id: 'wencaishen', name: '比干', title: '文财神', effect: '法力上限+10', bonus: 1 },
            { id: 'wucaishen', name: '关公', title: '武财神', effect: '化缘收益+15%', bonus: 1 },
            { id: 'piancaishen', name: '范蠡', title: '偏财神', effect: '暴击率+5%', bonus: 1 },
            { id: 'shengcai', name: '李诡祖', title: '增福财神', effect: '供奉功德+10%', bonus: 1.1 },
            { id: 'lucaishen', name: '沈万三', title: '禄财神', effect: '法力回复+20%', bonus: 1 },
            { id: 'shoucaishen', name: '刘海蟾', title: '寿财神', effect: '香火钱上限+1000', bonus: 1 },
            { id: 'xicaishen', name: '子贡', title: '喜财神', effect: '每日首供双倍', bonus: 1 },
            { id: 'caishenpo', name: '财神奶奶', title: '财神婆婆', effect: '化缘风险-10%', bonus: 1 }
        ];
        
        let selectedGod = 0;
        let selectedMat = 'incense';
        
        function init() {
            renderGods();
            updateUI();
            setInterval(recoverMana, 1000); // 1秒恢复1点（测试用）
        }
        
        function renderGods() {
            const container = document.getElementById('god-list');
            container.innerHTML = gods.map((god, index) => `
                <div class="god-item ${index === selectedGod ? 'selected' : ''}" onclick="selectGod(${index})">
                    <div class="god-name">${god.name}</div>
                    <div class="god-effect">${god.effect}</div>
                </div>
            `).join('');
        }
        
        function selectGod(index) {
            selectedGod = index;
            renderGods();
        }
        
        function selectMaterial(mat) {
            selectedMat = mat;
            document.querySelectorAll('.material-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('mat-' + mat).classList.add('selected');
        }
        
        function worship() {
            const mat = materials[selectedMat];
            if (gameData[mat.item] < mat.cost) {
                log('temple-log', `❌ ${mat.name}不足！`);
                return;
            }
            
            gameData[mat.item] -= mat.cost;
            const god = gods[selectedGod];
            const reward = Math.floor(mat.reward * god.bonus);
            
            gameData.incense_money += reward;
            gameData.merit += 1;
            
            log('temple-log', `✅ 用${mat.name}供奉${god.name}！+${reward}香火钱 +1功德`);
            updateUI();
        }
        
        function goAlms(region, risk, baseReward) {
            if (gameData.mana < 5) {
                log('alms-log', '❌ 法力不足！(需要5点)');
                return;
            }
            
            gameData.mana -= 5;
            
            if (Math.random() < risk) {
                const loss = Math.floor(gameData.incense_money * 0.3);
                gameData.incense_money = Math.max(0, gameData.incense_money - loss);
                log('alms-log', `💀 遭遇不幸！损失${loss}香火钱`);
            } else {
                const reward = Math.floor(baseReward * (0.8 + Math.random() * 0.4));
                gameData.incense_money += reward;
                log('alms-log', `✅ 化缘成功！获得${reward}香火钱`);
            }
            
            updateUI();
        }
        
        function doUpgrade() {
            const current = stages[gameData.stage];
            if (!current.next) {
                log('upgrade-log', '🎉 已达到最高阶段！');
                return;
            }
            
            const need = current.need;
            
            // 检查功德（门槛）
            if (gameData.merit < need.merit) {
                log('upgrade-log', `❌ 功德不足！需要${need.merit}功德作为门槛`);
                return;
            }
            
            // 检查其他资源
            if (gameData.incense_money < need.money) {
                log('upgrade-log', `❌ 香火钱不足！需要${need.money}`);
                return;
            }
            if (gameData.incense_sticks < need.incense) {
                log('upgrade-log', `❌ 线香不足！需要${need.incense}`);
                return;
            }
            if (gameData.candles < need.candles) {
                log('upgrade-log', `❌ 蜡烛不足！需要${need.candles}`);
                return;
            }
            
            // 扣除资源
            gameData.merit -= need.merit;
            gameData.incense_money -= need.money;
            gameData.incense_sticks -= need.incense;
            gameData.candles -= need.candles;
            
            gameData.stage = current.next;
            gameData.level += 5;
            
            log('upgrade-log', `🎉 升级成功！进化到${stages[gameData.stage].name}！等级${gameData.level}`);
            updateUI();
        }
        
        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(section + '-section').classList.remove('hidden');
            event.target.classList.add('active');
            updateUI();
        }
        
        function updateUI() {
            document.getElementById('money').textContent = gameData.incense_money;
            document.getElementById('merit').textContent = gameData.merit;
            document.getElementById('mana').textContent = gameData.mana;
            document.getElementById('level').textContent = gameData.level;
            document.getElementById('stage').textContent = stages[gameData.stage].name;
            document.getElementById('yuanbao').textContent = gameData.yuanbao;
            
            document.getElementById('incense-sticks').textContent = gameData.incense_sticks;
            document.getElementById('candles').textContent = gameData.candles;
            document.getElementById('gold-paper').textContent = gameData.gold_paper;
            document.getElementById('fruits').textContent = gameData.fruits;
            
            const current = stages[gameData.stage];
            document.getElementById('current-stage').textContent = current.name;
            
            if (current.need) {
                document.getElementById('need-resources').innerHTML = `
                    升级需要:<br>
                    ✨ 功德: ${current.need.merit} (当前${gameData.merit})<br>
                    💰 香火钱: ${current.need.money} (当前${gameData.incense_money})<br>
                    📿 线香: ${current.need.incense} (当前${gameData.incense_sticks})<br>
                    🕯️ 蜡烛: ${current.need.candles} (当前${gameData.candles})
                `;
            } else {
                document.getElementById('need-resources').textContent = '已达到最高阶段！';
            }
        }
        
        function recoverMana() {
            if (gameData.mana < 100) {
                gameData.mana++;
                updateUI();
            }
        }
        
        function log(containerId, message) {
            const container = document.getElementById(containerId);
            const item = document.createElement('div');
            item.className = 'log-item';
            item.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            container.insertBefore(item, container.firstChild);
            while (container.children.length > 10) {
                container.removeChild(container.lastChild);
            }
        }
        
        init();
    </script>
</body>
</html>
